name: PR Review & Quality

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  labeler:
    name: Auto Labeler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

  size-check:
    name: Size Assessment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Size Labeling
        uses: pascalgn/size-label-action@v0.5.5
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: >
            {
              "0": "XS",
              "10": "S",
              "100": "M",
              "500": "L",
              "1000": "XL"
            }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: false  # disabled until GitHub dependency graph/security analysis is enabled for this repository
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  meaningful-pr:
    name: Meaningful PR Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check for Linked Issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const hasIssueLink = /Closes\s+#\d+|Fixes\s+#\d+|Resolves\s+#\d+/i.test(body);
            if (!hasIssueLink) {
              core.setFailed("PR description must include a link to a related issue (e.g., 'Closes #101').");
            }

  pr-checklist:
    name: Contributor Checklist
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event.action == 'opened'
    steps:
      - name: Post Checklist Comment
        uses: actions/github-script@v7
        with:
          script: |
            const checklist = `
            ### 🚀 Done Verification Checklist
            - [ ] **Problem & Impact**: Does the description clearly state the problem and the impact of the fix?
            - [ ] **Issue Linked**: Does the PR description include \`Closes #XXX\`?
            - [ ] **Tests**: Have you added/updated tests?
            - [ ] **UI Screenshots**: If this is a frontend change, have you attached screenshots or a video?
            - [ ] **Code Quality**: Does the code follow the [Zendvo Five Principles]?
            
            *This is an automated reminder to ensure high-quality contributions.*
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: checklist
            });
